<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-GLhlTQ8iRABdZLl6O3oVMWSktQOp6b7In1Zl3/Jr59b6EGGoI1aFkw7cmDA6j6gD" crossorigin="anonymous">
    <link rel="stylesheet" href="{{url_for('static', filename='css/style.css')}}">
    <title>iMa SmartShopper - Edit Item</title>
</head>
<body class="app-page">
    <main class="app-shell narrow">
        <nav class="app-nav" aria-label="Item navigation">
            <a class="brand-link" href="/shopping_list">iMa SmartShopper</a>
            <div class="nav-actions">
                <a href="/shopping_list" class="btn btn-outline-dark">Back</a>
                <a href="/signout" class="btn btn-outline-dark">Sign out</a>
            </div>
        </nav>

        <section class="page-heading">
            <p class="eyebrow">Edit item</p>
            <h1 class="title">Update {{ list.item }}</h1>
        </section>

        <form action="/item/update/{{list.id}}" class="item-form" method="post">
            <div class="form-floating">
                <input type="text" class="form-control" id="itemName" placeholder="Item" name="item" value="{{list.item}}">
                <label for="itemName" class="form-label">Item</label>
            </div>
            <div class="form-grid">
                <div class="form-floating">
                    <input type="text" class="form-control" id="itemCategory" placeholder="Category" name="category" value="{{list.category}}">
                    <label for="itemCategory" class="form-label">Category</label>
                </div>
                <div class="form-floating">
                    <input type="number" class="form-control" id="itemQty" placeholder="Qty" name="qty" value="{{list.qty}}">
                    <label for="itemQty" class="form-label">Qty</label>
                </div>
            </div>
            <div class="form-floating">
                <input type="text" class="form-control" id="itemNote" placeholder="Note" name="note" value="{{list.note}}">
                <label for="itemNote" class="form-label">Note</label>
            </div>
            <button type="submit" class="btn btn-lg btn-primary">Update Item</button>
            <input type="hidden" name="id" value="{{list.id}}">
        </form>
    </main>
</body>
</html>
